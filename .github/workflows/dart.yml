name: Build IPA for iOS Không Ký

on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép kích hoạt thủ công

jobs:
  build:
    runs-on: macos-latest # Bắt buộc phải dùng macOS để build iOS

    steps:
      # 1. Tải mã nguồn
      - name: ⬇️ Tải Mã Nguồn (Checkout)
        uses: actions/checkout@v4

      # 2. Thiết lập Flutter
      - name: 🎯 Thiết Lập Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Clean & Tải Pub
      - name: 🧹 Dọn Dẹp và Tải Gói (Pub Get)
        run: |
          flutter clean
          flutter pub get

      # 4. Sửa Podfile & Deployment Target (iOS 13)
      - name: ⚙️ Cập Nhật Podfile và Deployment Target
        run: |
          PODFILE_PATH="ios/Podfile"
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"

          echo "--- Cập nhật Podfile ---"
          # Đảm bảo platform :ios, '13.0'
          sed -i '' "s/^# *platform :ios.*/platform :ios, '13.0'/g" "$PODFILE_PATH"
          sed -i '' "s/^platform :ios.*/platform :ios, '13.0'/g" "$PODFILE_PATH"

          echo "--- Cập nhật Deployment Target trong Xcode project ---"
          perl -i -pe 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PROJECT_FILE"

      # 5. Cài đặt Pods
      - name: 📦 Cài Đặt và Cập Nhật Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # 6. Xây dựng iOS Không Ký
      - name: 🔨 Xây Dựng iOS (Không Ký Tên)
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"

          echo "--- Vô hiệu hóa Code Signing ---"
          # Tắt Code Signing bằng cách sửa project.pbxproj
          perl -i -pe 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          perl -i -pe 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/g' "$PROJECT_FILE"
          perl -i -pe 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PROJECT_FILE"
          perl -i -pe 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          perl -i -pe 's/CODE_SIGN_STYLE = .*;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          perl -i -pe 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO/g' "$PROJECT_FILE"
          perl -i -pe 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO/g' "$PROJECT_FILE"

          echo "--- Bắt đầu Build bằng xcodebuild ---"
          # Lệnh build chính
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios_derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      # 7. Đóng gói IPA
      - name: 🎁 Đóng Gói thành IPA
        run: |
          echo "--- Đang đóng gói IPA ---"
          # Sử dụng derivedDataPath đã định nghĩa ở bước trước
          APP_PATH="build/ios_derived/Build/Products/Release-iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Không tìm thấy Runner.app!"
            exit 1
          fi

          IPA_DIR="build/ipa_output"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"

          # Nén file .ipa
          (cd "$IPA_DIR" && zip -qry bdpos_smart.ipa Payload)

          rm -rf "$IPA_DIR/Payload"

          echo "--- File IPA đã được tạo tại: $IPA_DIR/bdpos_smart.ipa ---"

      # 8. Tải lên Artifact
      - name: 📤 Tải Lên Artifact (File IPA)
        uses: actions/upload-artifact@v4
        with:
          name: bdpos_smart-ipa
          path: build/ipa_output/bdpos_smart.ipa
          retention-days: 7
